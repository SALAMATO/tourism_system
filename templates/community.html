{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动交流-低空旅游</title>
        <!-- 基础 ICO（Windows / 旧浏览器） -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <!-- PNG 标准尺寸 -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <!-- Apple 设备 -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <!-- Android / Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/android-chrome-512x512.png' %}">
    <!-- PWA -->
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260310">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <!-- 富文本内容样式 -->
    <style>
        .rich-text-content h2 {
            font-size: 1.3em;
            font-weight: bold;
            margin: 1em 0 0.5em 0;
            color: #2c3e50;
        }
        
        .rich-text-content h3 {
            font-size: 1.2em;
            font-weight: bold;
            margin: 0.8em 0 0.4em 0;
            color: #34495e;
        }
        
        .rich-text-content h4 {
            font-size: 1.1em;
            font-weight: bold;
            margin: 0.6em 0 0.3em 0;
            color: #7f8c8d;
        }
        
        .rich-text-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }
        
        .rich-text-content strong {
            font-weight: bold;
            color: #e74c3c;
        }
        
        /* 修复图片显示问题 - 限制图片最大宽度 */
        .rich-text-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1em auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .rich-text-content figure {
            margin: 1em 0;
        }
        
        .rich-text-content figure img {
            margin: 0 auto;
        }
    </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{% url 'home' %}" class="navbar-brand"><i class="fas fa-plane-departure"></i> 低空旅游信息管理系统</a>
      <ul class="navbar-menu">
        <li><a href="{% url 'destinations' %}">旅游目的地</a></li>
        <li><a href="{% url 'policies' %}">政策法规</a></li>
        <li><a href="{% url 'statistics' %}">发展现状</a></li>
        <li><a href="{% url 'safety' %}">安全预警</a></li>
        <li><a href="{% url 'news' %}">新闻资讯</a></li>
        <li><a href="{% url 'community' %}">互动交流</a></li>
      </ul>
      <button class="navbar-toggle" id="navbar-toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div id="user-menu">
        <!-- 用户菜单将通过JS动态加载 -->
      </div>
    </div>
  </nav>

  <!-- 移动端菜单覆盖层 -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay">
    <!-- 汉堡按钮移至此处，菜单展开时作为关闭按钮 -->
    <button class="navbar-toggle mobile-menu-toggle" id="mobile-menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="mobile-menu">
      <a href="{% url 'destinations' %}" class="mobile-menu-item">旅游目的地</a>
      <a href="{% url 'policies' %}" class="mobile-menu-item">政策法规</a>
      <a href="{% url 'statistics' %}" class="mobile-menu-item">发展现状</a>
      <a href="{% url 'safety' %}" class="mobile-menu-item">安全预警</a>
      <a href="{% url 'news' %}" class="mobile-menu-item">新闻资讯</a>
      <a href="{% url 'community' %}" class="mobile-menu-item">互动交流</a>
    </div>
  </div>

  <div class="page-header">
    <h1>💬 互动交流平台</h1>
    <p>分享想法、参与讨论、专家答疑</p>
  </div>

  <main class="container" style="max-width: 800px;">
    <!-- 发帖按钮 -->
    <div style="margin-bottom: 20px;">
      <button id="post-btn" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 16px; border-radius: 50px;">
        <i class="fas fa-pen"></i> 发布留言
      </button>
    </div>

    <!-- 排序选项卡 -->
    <div class="category-tabs" style="margin-bottom: 20px;">
      <button class="category-tab active" data-sort="latest">
        <i class="fas fa-clock"></i> 最新
      </button>
      <button class="category-tab" data-sort="hot">
        <i class="fas fa-fire"></i> 热门
      </button>
      <button class="category-tab" data-sort="replied">
        <i class="fas fa-check-circle"></i> 已回复
      </button>
    </div>

    <!-- 动态列表 -->
    <div id="messages-container">
      <!-- 留言将动态加载 -->
    </div>

    <!-- 加载更多提示 -->
    <div id="load-more" style="text-align: center; padding: 20px; display: none;">
      <div class="spinner"></div>
      <div>加载更多...</div>
    </div>
  </main>

  <!-- 发帖弹窗 -->
  <div id="post-modal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h2 class="modal-title">发布留言</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="message-form">
          <div class="form-group">
            <label class="form-label">类型</label>
            <select id="message-type" class="form-select" required>
              <option value="讨论">💬 讨论</option>
              <option value="咨询">❓ 咨询</option>
              <option value="建议">💡 建议</option>
              <option value="分享">📢 分享</option>
              <option value="其他">📝 其他</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">内容 *</label>
            <textarea id="message-content" class="form-textarea" rows="6" required placeholder="分享你的想法..."></textarea>
          </div>
          
          <div style="display: flex; justify-content: flex-end; gap: 12px;">
            <button type="button" class="btn btn-secondary" onclick="postModal.close()">取消</button>
            <button type="submit" class="btn btn-primary">发布</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 评论弹窗 -->
  <div id="comments-modal" class="modal">
    <div class="modal-content elegant-modal" style="max-width: 680px; max-height: 90vh; padding: 0;">
{#      <div class="modal-header">#}
{#        <h2 class="modal-title">回复留言</h2>#}
{#        <button class="modal-close">&times;</button>#}
{#      </div>#}
      <div class="modal-body" style="max-height: calc(90vh - 80px); overflow-y: auto; padding: 0;">
        <!-- 原始留言信息 -->
        <div id="comments-message-info" style="padding: 24px 32px;">
        </div>
        
        <!-- 发表评论区域 -->
        <div style="border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 20px 32px; background: var(--background-secondary);">
          <div class="form-group" style="margin-bottom: 12px;">
            <label class="form-label" style="font-weight: 500; margin-bottom: 8px; display: block;">
              <i class="fas fa-comment-dots"></i> 发表评论
            </label>
            <textarea id="comment-content" class="form-textarea" rows="3" placeholder="写下你的评论..." style="resize: none; border-radius: 12px; background: var(--background);"></textarea>
          </div>
          <div style="display: flex; justify-content: flex-start; gap: 12px;">
            <button type="button" class="btn btn-primary" onclick="submitComment()" style="padding: 10px 24px;"><i class="fas fa-paper-plane"></i> 发送
            <button type="button" class="btn btn-secondary" onclick="commentsModal.close()" style="padding: 10px 24px;">取消</button>
              
            </button>
          </div>
        </div>
        
        <!-- 评论列表 -->
        <div style="padding: 0 32px 24px 32px;">
          <div id="comments-list-container">
            <div style="padding: 40px 0; text-align: center; color: var(--text-secondary); font-size: 14px;">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="{% url 'destinations' %}">旅游目的地</a>
      <a href="{% url 'policies' %}">政策法规</a>
      <a href="{% url 'statistics' %}">发展现状</a>
      <a href="{% url 'safety' %}">安全预警</a>
      <a href="{% url 'news' %}">新闻资讯</a>
      <a href="{% url 'community' %}">互动交流</a>
    </div>
    <p>&copy; 2024 低空旅游信息管理系统. All rights reserved.</p>
  </footer>
  
<!-- CKEditor 5 CDN - Classic版本 -->
<script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/ckeditor.js"></script>
<script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/translations/zh-cn.js"></script>

<script src="{% static 'js/utils.js' %}"></script>
<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/auth-modal.js' %}"></script>
<script src="{% static 'js/ai-chat.js' %}?v=20260310?v=20260310"></script>
<script src="{% static 'js/ckeditor-init.js' %}"></script>
<script src="{% static 'js/community.js' %}"></script>
</body>
</html>
