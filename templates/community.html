{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动交流-低空旅游</title>
        <!-- 基础 ICO（Windows / 旧浏览器） -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <!-- PNG 标准尺寸 -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <!-- Apple 设备 -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <!-- Android / Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/android-chrome-512x512.png' %}">
    <!-- PWA -->
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{% url 'home' %}" class="navbar-brand"><i class="fas fa-plane-departure"></i> 低空旅游信息管理系统</a>
      <ul class="navbar-menu">
        <li><a href="{% url 'home' %}">首页</a></li>
        <li><a href="{% url 'policies' %}">政策法规</a></li>
        <li><a href="{% url 'statistics' %}">发展现状</a></li>
        <li><a href="{% url 'safety' %}">安全预警</a></li>
        <li><a href="{% url 'news' %}">新闻资讯</a></li>
        <li><a href="{% url 'community' %}">互动交流</a></li>
        <li><a href="{% url 'admin_page' %}">管理后台</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <h1>💬 互动交流平台</h1>
    <p>专家答疑、企业经验分享、公众意见反馈</p>
  </div>

  <main class="container">
    <div class="card">
      <h2 class="card-title">提交您的问题或建议</h2>
      <form id="message-form">
        <div class="form-group">
          <label class="form-label">姓名 *</label>
          <input type="text" id="username" class="form-input" required placeholder="请输入您的姓名">
        </div>
        
        <div class="form-group">
          <label class="form-label">邮箱 *</label>
          <input type="email" id="email" class="form-input" required placeholder="请输入您的邮箱">
        </div>
        
        <div class="form-group">
          <label class="form-label">消息类型 *</label>
          <select id="message-type" class="form-select" required>
            <option value="">请选择</option>
            <option value="咨询">咨询</option>
            <option value="建议">建议</option>
            <option value="投诉">投诉</option>
            <option value="合作">合作</option>
            <option value="其他">其他</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">内容 *</label>
          <textarea id="content" class="form-textarea" required placeholder="请详细描述您的问题或建议"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">提交</button>
      </form>
    </div>

    <h2 class="section-title" style="margin-top: 60px;">留言列表</h2>
    <div class="category-tabs">
      <button class="category-tab active" data-status="all">全部</button>
      <button class="category-tab" data-status="待回复">待回复</button>
      <button class="category-tab" data-status="已回复">已回复</button>
    </div>

    <div id="messages-container">
      <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="{% url 'policies' %}">政策法规</a>
      <a href="{% url 'statistics' %}">发展现状</a>
      <a href="{% url 'safety' %}">安全预警</a>
      <a href="{% url 'news' %}">新闻资讯</a>
      <a href="{% url 'community' %}">互动交流</a>
      <a href="{% url 'admin_page' %}">管理后台</a>
    </div>
    <p>&copy; 2024 低空旅游信息管理系统. All rights reserved.</p>
  </footer>
  
<script src="{% static 'js/utils.js' %}"></script>
<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/community.js' %}"></script>
</body>
</html>
