<!-- 安全隐患管理模块 -->
<div id="safety-module" class="admin-module">
  <h2 class="section-title">安全隐患管理</h2>
  
  <div class="card">
    <h3 class="card-title">添加安全隐患</h3>
    
    <form id="safety-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">隐患标题 *</label>
          <input type="text" id="safety-title" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">隐患类别 *</label>
          <input type="text" id="safety-category" class="form-input" placeholder="如：天气因素、设备故障等" required>
        </div>
      </div>
    
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">风险等级 *</label>
          <select id="safety-risk" class="form-select" required>
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">状态 *</label>
          <select id="safety-status" class="form-select" required>
            <option value="待处理">待处理</option>
            <option value="处理中">处理中</option>
            <option value="已解决">已解决</option>
          </select>
        </div>
      </div>
    
      <div class="form-group">
        <label class="form-label">详细描述 *</label>
        <textarea id="safety-description" class="form-textarea" rows="5" placeholder="请详细描述安全隐患"></textarea>
      </div>
    
      <div class="form-group">
        <label class="form-label">预防措施 *</label>
        <textarea id="safety-prevention" class="form-textarea" rows="5" placeholder="请输入预防措施"></textarea>
      </div>
    
      <div class="form-group">
        <label class="form-label">应急预案 *</label>
        <textarea id="safety-plan" class="form-textarea" rows="5" placeholder="请输入应急预案"></textarea>
      </div>
      
      <!-- 时间信息编辑区域（编辑时显示） -->
      <div id="safety-time-info" style="display: none; margin-top: 16px; padding: 16px; background: #f8f9fa; border-radius: 8px;">
        <h4 style="margin: 0 0 12px 0; font-size: 14px; color: #333;">
          <i class="fas fa-clock"></i> 时间设置
        </h4>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" style="font-size: 13px;">创建时间</label>
            <input type="datetime-local" id="safety-created-at-input" class="form-input" style="font-size: 13px;">
            <div style="margin-top: 4px; font-size: 12px; color: #999;">
              <i class="fas fa-info-circle"></i> 首次创建记录的时间
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" style="font-size: 13px;">更新时间</label>
            <input type="datetime-local" id="safety-updated-at-input" class="form-input" style="font-size: 13px;">
            <div style="margin-top: 4px; font-size: 12px; color: #999;">
              <i class="fas fa-info-circle"></i> 最后修改记录的时间
            </div>
          </div>
        </div>
      </div>
        
      <div style="margin-top: 8px;">
        <button type="submit" class="btn btn-primary">提交</button>
        <button type="button" id="safety-delete-btn" class="btn btn-danger" style="display:none; margin-left: 12px;">删除</button>
      </div>
    </form>
  </div>

  <div class="card" style="margin-top: 24px;">
    <h3 class="card-title">已登记隐患（最近）</h3>
    <div id="safety-list-container">
      <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
    </div>
  </div>
</div>
