<!-- 政策法规管理模块 -->
<div id="policy-module" class="admin-module">
  <h2 class="section-title">政策法规管理</h2>
  
  <!-- 添加/编辑表单 -->
  <div class="card">
    <h3 class="card-title" id="policy-form-title">添加政策法规</h3>
    
    <!-- 政策识别功能 -->
    <div style="background: var(--background-secondary); padding: 20px; border-radius: 12px; margin-bottom: 24px;">
      <h4 style="font-size: 18px; margin-bottom: 12px; color: var(--text-primary);">
        <i class="fas fa-magic"></i> 智能原文识别
      </h4>
      <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
        输入政策原文URL，自动提取标题、发布部门、发布日期和内容
      </p>
      <div style="display: flex; gap: 12px;">
        <input type="url" id="policy-url-input" class="form-input" 
               placeholder="输入政策URL" style="flex: 1;">
        <button type="button" id="fetch-policy-btn" class="btn btn-primary" style="white-space: nowrap;">
          <i class="fas fa-download"></i> 识别原文
        </button>
      </div>
      <div id="fetch-policy-status" style="margin-top: 12px; font-size: 14px;"></div>
    </div>
    
    <form id="policy-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">政策标题 *</label>
          <input type="text" id="policy-title" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">发布部门 *</label>
          <input type="text" id="policy-department" class="form-input" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">政策级别 *</label>
          <select id="policy-level" class="form-select" required>
            <option value="国家级">国家级</option>
            <option value="省级">省级</option>
            <option value="市级">市级</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">发布日期 *</label>
          <input type="date" id="policy-date" class="form-input" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">分类 *</label>
          <input type="text" id="policy-category" class="form-input" 
                 placeholder="如：安全管理、运营规范等" required>
        </div>
        <div class="form-group">
          <label class="form-label">标签（用逗号分隔）</label>
          <input type="text" id="policy-tags" class="form-input" 
                 placeholder="低空旅游,航空安全,政策解读">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">原文链接（选填）</label>
        <input type="url" id="policy-url" class="form-input" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">政策内容 *</label>
        <textarea id="policy-content" class="form-textarea" rows="8" 
                  placeholder="请输入政策法规的详细内容"></textarea>
      </div>

      <!-- AI 智能摘要 -->
      <div style="background: linear-gradient(135deg, rgba(0,113,227,0.06), rgba(99,179,237,0.08)); 
                  border: 1px solid rgba(0,113,227,0.2); border-radius: 12px; padding: 20px; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <h4 style="font-size: 16px; color: var(--text-primary); margin: 0;">
            <i class="fas fa-robot" style="color: var(--primary-color);"></i> AI 智能助手
          </h4>
          <div style="display: flex; gap: 8px;">
            <button type="button" id="policy-ai-format-btn" class="btn btn-secondary" 
                    style="font-size: 13px; padding: 6px 16px;">
              <i class="fas fa-align-left"></i> 整理原文
            </button>
            <button type="button" id="policy-ai-summary-btn" class="btn btn-primary" 
                    style="font-size: 13px; padding: 6px 16px;">
              <i class="fas fa-magic"></i> 生成摘要
            </button>
          </div>
        </div>
        <p style="font-size: 13px; color: var(--text-secondary); margin: 0 0 12px;">
          <strong>整理原文</strong>：AI 自动识别标题层级、段落结构<br>
          <strong>生成摘要</strong>：生成关键摘要、核心观点、推荐标签与分类
        </p>
        <div id="policy-ai-summary-loading" style="display:none; text-align:center; padding: 12px;">
          <i class="fas fa-spinner fa-spin"></i> AI 正在分析，请稍候...
        </div>
        <div id="policy-ai-summary-error" style="display:none; color: var(--danger-color); font-size: 13px; margin-top: 8px;"></div>
        <div id="policy-ai-summary-result" style="display:none;">
          <div style="margin-bottom: 10px;">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px;">关键摘要</div>
            <div id="policy-ai-summary-text" style="font-size: 14px; line-height: 1.7; padding: 10px 14px; 
                       background: var(--background); border-radius: 8px; border-left: 3px solid var(--primary-color);"></div>
          </div>
          <div style="margin-bottom: 10px;">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px;">核心观点</div>
            <ul id="policy-ai-keypoints" style="margin: 0; padding-left: 20px; font-size: 14px; line-height: 1.8;"></ul>
          </div>
          <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 12px;">
            <div>
              <span style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">推荐分类：</span>
              <span id="policy-ai-category" style="font-size: 13px; padding: 2px 10px; 
                       background: rgba(0,113,227,0.1); color: var(--primary-color); border-radius: 20px;"></span>
            </div>
            <div>
              <span style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">推荐标签：</span>
              <span id="policy-ai-tags" style="font-size: 13px;"></span>
            </div>
          </div>
          <button type="button" id="policy-ai-apply-btn" class="btn btn-primary" 
                  style="font-size: 12px; padding: 5px 14px;">
            <i class="fas fa-check"></i> 应用标签与分类
          </button>
        </div>
      </div>
      
      <div style="margin-top: 8px;">
        <button type="submit" class="btn btn-primary">提交</button>
        <button type="button" id="policy-delete-btn" class="btn btn-danger" 
                style="display:none; margin-left: 12px;">删除</button>
      </div>
    </form>
  </div>

  <!-- 已发布政策列表 -->
  <div class="card" style="margin-top: 24px;">
    <h3 class="card-title">已发布政策（最近）</h3>
    <div id="policy-list-container">
      <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
    </div>
  </div>
</div>
