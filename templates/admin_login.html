{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录-低空旅游</title>
        <!-- 基础 ICO（Windows / 旧浏览器） -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <!-- PNG 标准尺寸 -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <!-- Apple 设备 -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <!-- Android / Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/android-chrome-512x512.png' %}">
    <!-- PWA -->
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{% url 'home' %}" class="navbar-brand">
        <i class="fas fa-plane-departure"></i> 低空旅游信息管理系统
      </a>
      <ul class="navbar-menu">
        <!-- 导航菜单将通过 JavaScript 动态生成 -->
      </ul>
      <button class="navbar-toggle" id="navbar-toggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- 移动端菜单覆盖层 -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay">
    <div class="mobile-menu">
      <!-- 移动端菜单将通过 JavaScript 动态生成 -->
    </div>
  </div>

  <div class="page-header">
    <h1>🔐 管理员登录</h1>
    <p>请输入管理员账号密码进入管理后台</p>
  </div>

  <main class="container" style="max-width: 480px;">
    <div class="card">
      <h2 class="card-title" style="text-align: center; margin-bottom: 24px;">后台登录</h2>

      {% if form.errors %}
        <div class="notification error show" style="margin-bottom: 16px;">
          用户名或密码错误，请重试。
        </div>
      {% endif %}

      <form method="post" action="{% url 'admin_login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_username">用户名</label>
          <input type="text" name="username" autofocus required
                 class="form-input" id="id_username">
        </div>

        <div class="form-group">
          <label class="form-label" for="id_password">密码</label>
          <input type="password" name="password" required
                 class="form-input" id="id_password">
        </div>

        {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
          登录
        </button>
      </form>

      <p style="margin-top: 16px; font-size: 14px; color: var(--text-secondary); text-align: center;">
        请输入后台管理员账户
      </p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <!-- 底部链接将通过 JavaScript 动态生成 -->
    </div>
    <p>&copy; 2024 低空旅游信息管理系统. All rights reserved.</p>
  </footer>
</body>
</html>
