{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页-低空旅游</title>
          <!-- 基础 ICO（Windows / 旧浏览器） -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <!-- PNG 标准尺寸 -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <!-- Apple 设备 -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <!-- Android / Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/android-chrome-512x512.png' %}">
    <!-- PWA -->
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260310">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <!-- 富文本内容样式 -->
    <style>
        .rich-text-content h2 {
            font-size: 1.3em;
            font-weight: bold;
            margin: 1em 0 0.5em 0;
            color: #2c3e50;
        }
        
        .rich-text-content h3 {
            font-size: 1.2em;
            font-weight: bold;
            margin: 0.8em 0 0.4em 0;
            color: #34495e;
        }
        
        .rich-text-content h4 {
            font-size: 1.1em;
            font-weight: bold;
            margin: 0.6em 0 0.3em 0;
            color: #7f8c8d;
        }
        
        .rich-text-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }
        
        .rich-text-content strong {
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{% url 'home' %}" class="navbar-brand"><i class="fas fa-plane-departure"></i> 低空旅游信息管理系统</a>
      <ul class="navbar-menu">
        <li><a href="{% url 'destinations' %}">旅游目的地</a></li>
        <li><a href="{% url 'policies' %}">政策法规</a></li>
        <li><a href="{% url 'statistics' %}">发展现状</a></li>
        <li><a href="{% url 'safety' %}">安全预警</a></li>
        <li><a href="{% url 'news' %}">新闻资讯</a></li>
        <li><a href="{% url 'community' %}">互动交流</a></li>
      </ul>
      <button class="navbar-toggle" id="navbar-toggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div id="user-menu">
        <!-- 用户菜单将通过JS动态加载 -->
      </div>
    </div>
  </nav>

  <!-- 移动端菜单覆盖层 -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay">
    <!-- 汉堡按钮移至此处，菜单展开时作为关闭按钮 -->
    <button class="navbar-toggle mobile-menu-toggle" id="mobile-menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="mobile-menu">
      <a href="{% url 'destinations' %}" class="mobile-menu-item">旅游目的地</a>
      <a href="{% url 'policies' %}" class="mobile-menu-item">政策法规</a>
      <a href="{% url 'statistics' %}" class="mobile-menu-item">发展现状</a>
      <a href="{% url 'safety' %}" class="mobile-menu-item">安全预警</a>
      <a href="{% url 'news' %}" class="mobile-menu-item">新闻资讯</a>
      <a href="{% url 'community' %}" class="mobile-menu-item">互动交流</a>
    </div>
  </div>

  <div class="page-header">
    <h1>👤 个人主页</h1>
    <p>查看个人信息、修改密码与我的留言</p>
  </div>

  <main class="container">
    <div class="card">
      <h2 class="card-title">基本信息</h2>
      <div id="profile-info">
        <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
      </div>
    </div>

    <div class="card">
      <div class="collapsible-section">
        <div class="collapsible-header" onclick="toggleEditProfile()">
          <h2 class="card-title" style="margin: 0;">更改个人资料</h2>
          <i class="fas fa-chevron-down" id="edit-profile-icon"></i>
        </div>
        <div class="collapsible-content" id="edit-profile-content">
          <div style="padding: 16px 0;">
            <h3 style="font-size: 18px; margin-bottom: 16px;">修改个人信息</h3>
            <form id="profile-form">
              <div class="form-group">
                <label class="form-label">登录名 *</label>
                <input type="text" id="profile-username" class="form-input" required minlength="3" maxlength="150">
                <small style="color: var(--text-secondary);">登录名60天内最多修改2次</small>
              </div>
              <div class="form-group">
                <label class="form-label">昵称</label>
                <input type="text" id="profile-nickname" class="form-input" placeholder="设置一个昵称">
                <small style="color: var(--text-secondary);">昵称将在互动交流中显示</small>
              </div>
              <div class="form-group">
                <label class="form-label">邮箱 *</label>
                <input type="email" id="profile-email" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" id="profile-phone" class="form-input" maxlength="11">
              </div>
              <button type="submit" class="btn btn-primary">保存个人信息</button>
            </form>

            <hr style="margin: 32px 0; border: none; border-top: 1px solid var(--border-color);">

            <h3 style="font-size: 18px; margin-bottom: 16px;">修改密码</h3>
            <form id="password-form">
              <div class="form-group">
                <label class="form-label">当前密码 *</label>
                <input type="password" id="old-password" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">新密码 *</label>
                <input type="password" id="new-password" class="form-input" required minlength="6">
              </div>
              <div class="form-group">
                <label class="form-label">确认新密码 *</label>
                <input type="password" id="new-password-confirm" class="form-input" required minlength="6">
              </div>
              <button type="submit" class="btn btn-primary">保存新密码</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">我的留言</h2>
      <div id="my-messages-container">
        <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="{% url 'destinations' %}">旅游目的地</a>
      <a href="{% url 'policies' %}">政策法规</a>
      <a href="{% url 'statistics' %}">发展现状</a>
      <a href="{% url 'safety' %}">安全预警</a>
      <a href="{% url 'news' %}">新闻资讯</a>
      <a href="{% url 'community' %}">互动交流</a>
    </div>
    <p>&copy; 2024 低空旅游信息管理系统. All rights reserved.</p>
  </footer>

  <!-- CKEditor 5 CDN - Classic版本 -->
  <script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/ckeditor.js"></script>
  <script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/translations/zh-cn.js"></script>

  <script src="{% static 'js/utils.js' %}?v=2"></script>
  <script src="{% static 'js/api.js' %}"></script>
  <script src="{% static 'js/auth.js' %}"></script>
  <script src="{% static 'js/ckeditor-init.js' %}"></script>
  <script src="{% static 'js/profile.js' %}"></script>
</body>
</html>
