{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册-低空旅游</title>
            <!-- 基础 ICO（Windows / 旧浏览器） -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <!-- PNG 标准尺寸 -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <!-- Apple 设备 -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <!-- Android / Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/android-chrome-512x512.png' %}">
    <!-- PWA -->
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260310">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    .auth-container {
      min-height: calc(100vh + 72px); /*  包括导航栏高度 */
      margin-top: -72px;              /*  向上覆盖导航栏 */
      padding-top: 72px;              /*  内容不被挡 */
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
    }
    
    .auth-container::before {
      content: '';
      position: absolute;
      inset: 0; 
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,101.3C1248,85,1344,75,1392,69.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      pointer-events: none;
    }
    
    .auth-box {
      background: var(--background);
      border-radius: 24px;
      box-shadow: var(--shadow-lg);
      max-width: 480px;
      width: 100%;
      padding: 48px;
    }
    
    .auth-tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--border-color);
    }
    
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
    }
    
    .auth-tab.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }
    
    .auth-form {
      display: none;
    }
    
    .auth-form.active {
      display: block;
    }
    
    .auth-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
      color: var(--text-primary);
    }
    
    .auth-form .form-group {
      margin-bottom: 20px;
    }
    
    .auth-form .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
    }
    
    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .auth-footer a {
      color: var(--primary-color);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{% url 'home' %}" class="navbar-brand">
        <span style="font-family: 'Font Awesome 6 Free'; font-weight: 900;">&#xf5b0;</span> 低空旅游信息管理系统
      </a>
      <button class="navbar-toggle" id="navbar-toggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- 移动端菜单覆盖层 -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay">
    <div class="mobile-menu">
      <a href="{% url 'home' %}" class="mobile-menu-item">首页</a>
      <a href="{% url 'destinations' %}" class="mobile-menu-item">旅游目的地</a>
      <a href="{% url 'policies' %}" class="mobile-menu-item">政策法规</a>
      <a href="{% url 'statistics' %}" class="mobile-menu-item">发展现状</a>
      <a href="{% url 'safety' %}" class="mobile-menu-item">安全预警</a>
      <a href="{% url 'news' %}" class="mobile-menu-item">新闻资讯</a>
      <a href="{% url 'community' %}" class="mobile-menu-item">互动交流</a>
    </div>
  </div>

  <!-- 认证容器 -->
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">登录</div>
        <div class="auth-tab" data-tab="register">注册</div>
      </div>

      <!-- 登录表单 -->
      <form id="login-form" class="auth-form active">
        <h2 class="auth-title">欢迎回来</h2>
        <p style="text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;">
          支持用户名、邮箱或手机号登录
        </p>
        
        <div class="form-group">
          <label class="form-label">账号</label>
          <input type="text" id="login-account" class="form-input" required placeholder="请输入用户名/邮箱/手机号">
          <small style="color: var(--text-secondary); font-size: 12px; margin-top: 4px; display: block;">
            支持用户名、邮箱或手机号登录
          </small>
        </div>
        
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="login-password" class="form-input" required placeholder="请输入密码">
        </div>
        
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-sign-in-alt"></i> 登录
        </button>
        
        <div class="auth-footer">
          还没有账号？<a href="#" onclick="switchTab('register'); return false;">立即注册</a>
        </div>
      </form>

      <!-- 注册表单 -->
      <form id="register-form" class="auth-form">
        <h2 class="auth-title">创建账号</h2>
        
        <div class="form-group">
          <label class="form-label">用户名 *</label>
          <input type="text" id="register-username" class="form-input" required placeholder="请输入用户名">
        </div>
        
        <div class="form-group">
          <label class="form-label">邮箱 *</label>
          <input type="email" id="register-email" class="form-input" required placeholder="请输入邮箱">
        </div>
        
        <div class="form-group">
          <label class="form-label">手机号（选填）</label>
          <input type="tel" id="register-phone" class="form-input" placeholder="请输入手机号">
        </div>
        
        <div class="form-group">
          <label class="form-label">密码 *</label>
          <input type="password" id="register-password" class="form-input" required placeholder="至少6位字符" minlength="6">
        </div>
        
        <div class="form-group">
          <label class="form-label">确认密码 *</label>
          <input type="password" id="register-password-confirm" class="form-input" required placeholder="请再次输入密码" minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-user-plus"></i> 注册
        </button>
        
        <div class="auth-footer">
          已有账号？<a href="#" onclick="switchTab('login'); return false;">立即登录</a>
        </div>
      </form>
    </div>
  </div>

  <script src="{% static 'js/utils.js' %}?v=2"></script>
  <script src="{% static 'js/auth.js' %}"></script>
  <script>
    // 标签切换
    function switchTab(tabName) {
      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.dataset.tab === tabName) {
          tab.classList.add('active');
        }
      });
      
      document.querySelectorAll('.auth-form').forEach(form => {
        form.classList.remove('active');
        if (form.id === `${tabName}-form`) {
          form.classList.add('active');
        }
      });
    }

    // 绑定标签点击事件
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        switchTab(tab.dataset.tab);
      });
    });

    // 登录表单提交
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const account = document.getElementById('login-account').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!account || !password) {
        showNotification('请填写所有字段', 'error');
        return;
      }
      
      try {
        await auth.login(account, password);
        showNotification('登录成功', 'success');
        
        // 获取重定向URL
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || '{% url 'home' %}';
        
        setTimeout(() => {
          window.location.href = redirect;
        }, 1000);
      } catch (error) {
        console.error('登录失败:', error);
        showNotification(error.message || '登录失败，请检查账号和密码', 'error');
      }
    });

    // 注册表单提交
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('register-username').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const phone = document.getElementById('register-phone').value.trim();
      const password = document.getElementById('register-password').value;
      const passwordConfirm = document.getElementById('register-password-confirm').value;
      
      if (!username || !email || !password || !passwordConfirm) {
        showNotification('请填写所有必填字段', 'error');
        return;
      }
      
      if (password !== passwordConfirm) {
        showNotification('两次密码输入不一致', 'error');
        return;
      }
      
      if (password.length < 6) {
        showNotification('密码至少需要6位字符', 'error');
        return;
      }
      
      try {
        await auth.register(username, email, password, passwordConfirm, phone);
        showNotification('注册成功，正在跳转...', 'success');
        
        setTimeout(() => {
          window.location.href = '{% url 'home' %}';
        }, 1000);
      } catch (error) {
        console.error('注册失败:', error);
        try {
          const errorObj = JSON.parse(error.message);
          const errorMsg = Object.values(errorObj).flat().join(', ');
          showNotification(`注册失败: ${errorMsg}`, 'error');
        } catch {
          showNotification('注册失败，请稍后重试', 'error');
        }
      }
    });

    // 检查是否已登录
    if (auth.isAuthenticated()) {
      const urlParams = new URLSearchParams(window.location.search);
      const redirect = urlParams.get('redirect') || '{% url 'home' %}';
      window.location.href = redirect;
    }
  </script>
</body>
</html>
