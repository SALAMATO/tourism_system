{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻资讯-低空旅游</title>
    <!-- 基础 ICO（Windows / 旧浏览器） -->
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <!-- PNG 标准尺寸 -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <!-- Apple 设备 -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <!-- Android / Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/android-chrome-512x512.png' %}">
    <!-- PWA -->
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}">
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260310">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <!-- Apple 新闻稿样式 -->
    <style>
        /* 页面头部样式 */
        .page-header {
            background: #f5f5f7;
            padding: 80px 20px 60px;
            text-align: center;
        }
        
        .page-header h1 {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -0.005em;
            line-height: 1.07;
            margin-bottom: 8px;
        }
        
        .page-header p {
            font-size: 21px;
            font-weight: 400;
            letter-spacing: 0.011em;
            line-height: 1.381;
            color: #6e6e73;
        }
        
        /* 搜索栏样式 */
        .search-bar {
            max-width: 980px;
            margin: -30px auto 40px;
            position: relative;
            z-index: 10;
        }
        
        /* 分类标签样式 */
        .category-tabs {
            max-width: 1400px;
            margin: 0 auto 48px;
            padding: 0 40px;
        }
        
        .category-tab {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.01em;
            padding: 10px 20px;
            border-radius: 980px;
        }
        
        /* 新闻网格布局 - 自适应网格 Apple 风格 */
        .news-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 48px 40px;
        }
        
        /* 新闻卡片 - Apple 风格 */
        .apple-news-card {
            background: #fff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        
        .apple-news-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
        }
        
        /* 新闻图片容器 - 固定高度 280px */
        .news-image-container {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }
        
        .news-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .apple-news-card:hover .news-image-container img {
            transform: scale(1.05);
        }
        
        /* 无图片时的占位符 */
        .news-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* 新闻内容区 */
        .news-card-content {
            padding: 28px 32px 32px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* 新闻分类标签 */
        .news-category-badge {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 12px;
        }
        
        /* 新闻标题 - 完全显示 */
        .news-card-title {
            font-size: 28px;
            line-height: 1.25;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 18px;
            flex: 1;
        }
        
        /* 移除摘要样式 */
        .news-card-excerpt {
            display: none;
        }
        
        /* 新闻元信息 */
        .news-card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #6e6e73;
        }
        
        .news-card-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .news-card-meta i {
            font-size: 14px;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .news-grid {
                grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
                gap: 40px 32px;
            }
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 40px;
            }
            
            .page-header p {
                font-size: 17px;
            }
            
            .search-bar,
            .category-tabs,
            .news-grid {
                padding: 0 20px;
            }
            
            .news-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }
            
            .news-image-container {
                height: 220px;
            }
            
            .news-card-title {
                font-size: 21px;
            }
            
            .news-card-content {
                padding: 20px 24px 24px;
            }
        }
        
        /* 空状态样式 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #86868b;
        }
        
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
        }
        
        .empty-state p {
            font-size: 17px;
        }
    </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{% url 'home' %}" class="navbar-brand"><i class="fas fa-plane-departure"></i> 低空旅游信息管理系统</a>
      <ul class="navbar-menu">
        <li><a href="{% url 'destinations' %}">旅游目的地</a></li>
        <li><a href="{% url 'policies' %}">政策法规</a></li>
        <li><a href="{% url 'statistics' %}">发展现状</a></li>
        <li><a href="{% url 'safety' %}">安全预警</a></li>
        <li><a href="{% url 'news' %}">新闻资讯</a></li>
        <li><a href="{% url 'community' %}">互动交流</a></li>
      </ul>
      <button class="navbar-toggle" id="navbar-toggle">
        <i class="fas fa-bars"></i>
      </button>
      <div id="user-menu">
        <!-- 用户菜单将通过JS动态加载 -->
      </div>
    </div>
  </nav>

  <!-- 移动端菜单覆盖层 -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay">
    <div class="mobile-menu">
      <a href="{% url 'destinations' %}" class="mobile-menu-item">旅游目的地</a>
      <a href="{% url 'policies' %}" class="mobile-menu-item">政策法规</a>
      <a href="{% url 'statistics' %}" class="mobile-menu-item">发展现状</a>
      <a href="{% url 'safety' %}" class="mobile-menu-item">安全预警</a>
      <a href="{% url 'news' %}" class="mobile-menu-item">新闻资讯</a>
      <a href="{% url 'community' %}" class="mobile-menu-item">互动交流</a>
    </div>
  </div>

  <div class="page-header">
    <h1>新闻资讯</h1>
    <p>低空旅游的最新讯息、事件与行业发展趋势</p>
  </div>

  <main class="container">
    <div class="search-bar">
      <input type="text" id="search-input" class="search-input" placeholder="搜索新闻标题或内容...">
      <button class="search-btn" onclick="handleSearch()"><i class="fas fa-search"></i></button>
    </div>

    <div class="category-tabs">
      <button class="category-tab active" data-category="all">全部</button>
      <button class="category-tab" data-category="行业动态">行业动态</button>
      <button class="category-tab" data-category="政策解读">政策解读</button>
      <button class="category-tab" data-category="技术创新">技术创新</button>
      <button class="category-tab" data-category="企业新闻">企业新闻</button>
      <button class="category-tab" data-category="市场分析">市场分析</button>
    </div>

    <div id="news-container">
      <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
    </div>

    <div id="pagination-container"></div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="{% url 'destinations' %}">旅游目的地</a>
      <a href="{% url 'policies' %}">政策法规</a>
      <a href="{% url 'statistics' %}">发展现状</a>
      <a href="{% url 'safety' %}">安全预警</a>
      <a href="{% url 'news' %}">新闻资讯</a>
      <a href="{% url 'community' %}">互动交流</a>
    </div>
    <p>&copy; 2024 低空旅游信息管理系统. All rights reserved.</p>
  </footer>
  
<script src="{% static 'js/utils.js' %}"></script>
<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/auth-modal.js' %}"></script>
<script src="{% static 'js/ai-chat.js' %}?v=20260310?v=20260310"></script>
<script src="{% static 'js/news.js' %}"></script>
</body>
</html>
