{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅游目的地详情</title>
  <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260427">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    body { background: #fff; }
    .destination-detail-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 80px 24px 80px;
    }
    .detail-header {
      margin-bottom: 24px;
    }
    .detail-title {
      font-size: 34px;
      line-height: 1.3;
      color: #111827;
      margin-bottom: 14px;
    }
    .detail-meta-row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      color: #4b5563;
      font-size: 14px;
    }
    .detail-gallery {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px;
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 36px;
    }
    .detail-gallery-main,
    .detail-gallery-side {
      min-height: 220px;
      background-size: cover;
      background-position: center;
    }
    .detail-gallery-main {
      grid-row: span 2;
      min-height: 520px;
    }
    .detail-main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 40px;
      align-items: start;
    }
    .detail-section {
      padding: 24px 0;
      border-bottom: 1px solid #ebedf0;
    }
    .detail-section h2 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #111827;
    }
    .detail-section p {
      font-size: 15px;
      color: #4b5563;
      line-height: 1.9;
    }
    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .feature-item {
      background: #f9fafb;
      border: 1px solid #eceff3;
      border-radius: 18px;
      padding: 18px;
      color: #374151;
      font-size: 14px;
      line-height: 1.7;
    }
    .booking-card {
      position: sticky;
      top: 96px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: 0 14px 34px rgba(17, 24, 39, 0.08);
      padding: 24px;
    }
    .booking-price {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 22px;
    }
    .booking-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .booking-grid-item {
      padding: 14px 16px;
      border-right: 1px solid #d1d5db;
      border-bottom: 1px solid #d1d5db;
    }
    .booking-grid-item:nth-child(2n) { border-right: none; }
    .booking-grid-item:last-child,
    .booking-grid-item:nth-last-child(2) { border-bottom: none; }
    .booking-label {
      display: block;
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .booking-value {
      color: #111827;
      font-size: 14px;
      font-weight: 600;
    }
    .detail-stat-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .detail-stat-card {
      background: #f9fafb;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #eceff3;
    }
    .detail-stat-card strong {
      display: block;
      font-size: 24px;
      color: #111827;
      margin-bottom: 6px;
    }
    .detail-stat-card span {
      color: #6b7280;
      font-size: 13px;
    }
    @media (max-width: 960px) {
      .detail-main-layout { grid-template-columns: 1fr; }
      .booking-card { position: static; }
      .detail-gallery { grid-template-columns: 1fr 1fr; }
      .detail-gallery-main { grid-column: span 2; min-height: 360px; }
      .feature-list, .detail-stat-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{% url 'home' %}" class="navbar-brand"><i class="fas fa-plane-departure"></i> 低空旅游信息管理系统</a>
      <ul class="navbar-menu">
        <li><a href="{% url 'destinations' %}">旅游目的地</a></li>
        <li><a href="{% url 'policies' %}">政策法规</a></li>
        <li><a href="{% url 'statistics' %}">发展现状</a></li>
        <li><a href="{% url 'safety' %}">安全预警</a></li>
        <li><a href="{% url 'news' %}">新闻资讯</a></li>
        <li><a href="{% url 'community' %}">互动交流</a></li>
      </ul>
      <div id="user-menu"></div>
    </div>
  </nav>
  
    <!-- 移动端菜单覆盖层 -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay">
    <div class="mobile-menu">
      <a href="{% url 'destinations' %}" class="mobile-menu-item">旅游目的地</a>
      <a href="{% url 'policies' %}" class="mobile-menu-item">政策法规</a>
      <a href="{% url 'statistics' %}" class="mobile-menu-item">发展现状</a>
      <a href="{% url 'safety' %}" class="mobile-menu-item">安全预警</a>
      <a href="{% url 'news' %}" class="mobile-menu-item">新闻资讯</a>
      <a href="{% url 'community' %}" class="mobile-menu-item">互动交流</a>
    </div>
  </div>

  <main class="destination-detail-shell" id="destination-detail-shell">
    <div class="loading"><div class="spinner"></div><div>正在加载目的地详情...</div></div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="{% url 'destinations' %}">旅游目的地</a>
      <a href="{% url 'policies' %}">政策法规</a>
      <a href="{% url 'statistics' %}">发展现状</a>
      <a href="{% url 'safety' %}">安全预警</a>
      <a href="{% url 'news' %}">新闻资讯</a>

    </div>
    <p>&copy; 2024 低空旅游信息管理系统. All rights reserved.</p>
  </footer>

  <script src="{% static 'js/utils.js' %}"></script>
  <script src="{% static 'js/api.js' %}"></script>
  <script src="{% static 'js/auth.js' %}"></script>
  <script src="{% static 'js/main.js' %}"></script>
  <script src="{% static 'js/destination-detail.js' %}?v=20260427"></script>
</body>
</html>
